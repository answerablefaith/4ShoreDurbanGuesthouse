name: Process blog images

on:
  push:
    branches: ["main"]
    paths:
      - "assets/images/IMG_*.jpeg"
      - "tools/process-blog-images.py"
      - ".github/workflows/process-blog-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --upgrade pillow

      - name: Process uploaded blog images
        run: python tools/process-blog-images.py

      - name: Commit processed blog images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/images
          if git diff --cached --quiet; then
            echo "No processed image changes to commit."
          else
            git commit -m "Process SEO blog images"
            git push
          fi
