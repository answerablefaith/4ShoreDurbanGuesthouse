name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add homepage Home and Blog links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          home = Path("index.html")
          html = home.read_text(encoding="utf-8")

          nav = '''<nav class="site-nav" id="site-nav" aria-label="Primary navigation">
 <a href="#home">Home</a>
 <a href="#gallery">Gallery</a>
 <a href="#about">About</a>
 <a href="#rooms">Rooms</a>
 <a href="#explore">The Bluff</a>
 <a href="#reviews">Reviews</a>
 <a href="#rates">Rates</a>
 <a href="#directions">Find us</a>
 <a href="blog/">Blog</a>
 </nav>'''

          html = re.sub(
              r'<nav class="site-nav" id="site-nav" aria-label="Primary navigation">.*?</nav>',
              nav,
              html,
              count=1,
              flags=re.S,
          )

          if "form-handler.js" not in html:
              html = html.replace(
                  '<script src="script.js?v=20260517-gallery-fix1"></script>',
                  '<script src="script.js?v=20260517-gallery-fix1"></script>\n\t <script src="form-handler.js?v=20260702-formsubmit2"></script>'
              )

          home.write_text(html, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
