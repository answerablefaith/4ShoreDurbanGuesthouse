name: Deploy static site to GitHub Pages

# Manual fallback only.
# The live 4Shore site is served from the repo/custom-domain Pages setup,
# so weekly blog commits should not trigger this workflow and generate failure emails.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add homepage menu links
        run: python3 tools/patch-pages-menu.py

      - name: Patch blog mobile article heroes
        run: python3 tools/patch-blog-mobile.py

      - name: Force clean blog mobile heroes
        run: python3 tools/force-blog-mobile-clean.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
