<!doctype html>
<html lang="en">
 <head>
 <meta charset="utf-8">
 <meta name="robots" content="noindex">
 <title>Netlify Forms</title>
 </head>
 <body>
 <form name="guesthouse-enquiry" method="POST" action="/" data-netlify="true" netlify-honeypot="bot_field" hidden>
 <input type="hidden" name="form-name" value="guesthouse-enquiry">
 <input type="hidden" name="subject" value="4Shore Guesthouse availability enquiry">
 <input name="bot_field">
 <input name="guest_name" type="text">
 <input name="guest_email" type="email">
 <input name="guest_phone" type="tel">
 <input name="guests" type="text">
 <input name="check_in" type="date">
 <input name="check_out" type="date">
 <input name="stay_purpose" type="radio" value="Business">
 <input name="stay_purpose" type="radio" value="Leisure">
 <textarea name="message"></textarea>
 </form>
 </body>
</html>
